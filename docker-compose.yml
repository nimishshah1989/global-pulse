version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: compass-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: momentum_compass
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - compass_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d momentum_compass"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: compass-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compass-backend
    restart: unless-stopped
    ports:
      - "8011:8000"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://compass:${POSTGRES_PASSWORD}@db:5432/momentum_compass
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compass-frontend
    restart: unless-stopped
    ports:
      - "8010:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  compass_pgdata:
