# global-pulse.jslwealth.in — Single domain config
# Frontend (port 8010) serves the SPA + proxies /api/ to backend (port 8011)
# So we only need ONE server block pointing to the frontend container

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name global-pulse.jslwealth.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name global-pulse.jslwealth.in;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/global-pulse.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/global-pulse.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Everything goes to frontend nginx container (which proxies /api/ to backend)
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Direct health check (bypass frontend)
    location /health {
        proxy_pass http://127.0.0.1:8011/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Logging
    access_log /var/log/nginx/global-pulse-access.log;
    error_log /var/log/nginx/global-pulse-error.log;
}
