# compass.jslwealth.in — Frontend
server {
    listen 80;
    server_name compass.jslwealth.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name compass.jslwealth.in;

    ssl_certificate /etc/letsencrypt/live/compass.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compass.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8109;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# compass-api.jslwealth.in — Backend API
server {
    listen 80;
    server_name compass-api.jslwealth.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name compass-api.jslwealth.in;

    ssl_certificate /etc/letsencrypt/live/compass-api.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compass-api.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
