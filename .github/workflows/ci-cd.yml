name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Build
        run: cd frontend && npm run build

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Type check
        run: |
          cd backend
          python -m py_compile main.py

  deploy:
    needs: [frontend-lint-build, backend-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to jslwealth server
        uses: appleboy/ssh-action@v1
        with:
          host: 13.206.34.214
          username: ubuntu
          key: ${{ secrets.JSL_WEALTH_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/ubuntu/global-pulse"

            # Clone if first deploy, otherwise pull
            if [ ! -d "$APP_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Create .env if it doesn't exist (first deploy)
            if [ ! -f .env ]; then
              echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)" > .env
            fi
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              # Patch DATABASE_URL for docker-compose PostgreSQL
              sed -i "s|DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://compass:$(grep POSTGRES_PASSWORD .env | cut -d= -f2)@db:5432/momentum_compass|" backend/.env
              sed -i "s|APP_ENV=.*|APP_ENV=production|" backend/.env
            fi

            # Build and deploy containers
            docker compose build
            docker compose up -d

            # Wait for health checks
            echo "Waiting for services to become healthy..."
            sleep 20
            docker compose ps

            # Verify backend health
            curl -sf http://localhost:8009/health || echo "WARNING: Backend health check failed"

            echo "Deploy complete: global-pulse.jslwealth.in"
