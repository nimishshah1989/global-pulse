# Nginx site config for global-pulse.jslwealth.in
# Copy to: /etc/nginx/sites-available/global-pulse
# Symlink: ln -s /etc/nginx/sites-available/global-pulse /etc/nginx/sites-enabled/

# Step 1: Start with HTTP only (before certbot)
server {
    listen 80;
    server_name global-pulse.jslwealth.in;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend — served from compass-frontend container (port 8010)
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Direct health check
    location /health {
        proxy_pass http://127.0.0.1:8011/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    access_log /var/log/nginx/global-pulse-access.log;
    error_log /var/log/nginx/global-pulse-error.log;
}
