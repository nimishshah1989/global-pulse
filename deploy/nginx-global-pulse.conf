# Nginx site config for global-pulse.jslwealth.in
# Copy to: /etc/nginx/sites-available/global-pulse
# Symlink: ln -s /etc/nginx/sites-available/global-pulse /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name global-pulse.jslwealth.in;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name global-pulse.jslwealth.in;

    # SSL — managed by Certbot (placeholders until cert is issued)
    ssl_certificate /etc/letsencrypt/live/global-pulse.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/global-pulse.jslwealth.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend — served from compass-frontend container (port 8109)
    location / {
        proxy_pass http://127.0.0.1:8109;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — proxied to compass-backend container (port 8009)
    # The frontend nginx already proxies /api/ to backend,
    # but this direct route avoids double-proxying for external API calls
    location /api/ {
        proxy_pass http://127.0.0.1:8009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint (direct to backend)
    location /health {
        proxy_pass http://127.0.0.1:8009/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Logging
    access_log /var/log/nginx/global-pulse-access.log;
    error_log /var/log/nginx/global-pulse-error.log;
}
